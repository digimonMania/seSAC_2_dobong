<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포폴</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/3.1.2/fullpage.min.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <a class="navbar-brand" href="#">내 웹사이트</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="내비게이션 토글">
    <span class="navbar-toggler-icon"></span>
  </button>
</nav>
<div id="fullpage">
    <div class="section" style="background-color: green;">
        <div class="container text-center text-white">
            <h1>환영합니다!</h1>
            <p>페이지</p>
            <button class="btn btn-light">자세히 보기</button>
        </div>
    </div>

    <div class="section" style="background-color: blue;">
        <div class="container text-center text-white">
            <h2>우리의 서비스</h2>

            <div class="card-deck">
                <div class="card bg-transparent border-0">
                    <img src="https://via.placeholder.com/150" class="card-img-top rounded-circle" alt="서비스1">
                    <div class="card-body">
                        <h5 class="card-title">서비스 1</h5>
                        <p class="card-text">서비스 1에 대한 설명입니다.</p>
                    </div>
                </div>
                <div class="card bg-transparent border-0">
                    <img src="https://via.placeholder.com/150" class="card-img-top rounded-circle" alt="서비스2">
                    <div class="card-body">
                        <h5 class="card-title">서비스 2</h5>
                        <p class="card-text">서비스 2에 대한 설명입니다.</p>
                    </div>
                </div>
                <div class="card bg-transparent border-0">
                    <img src="https://via.placeholder.com/150" class="card-img-top rounded-circle" alt="서비스3">
                    <div class="card-body">
                        <h5 class="card-title">서비스 3</h5>
                        <p class="card-text">서비스 3에 대한 설명입니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="section" style="background-color: violet;">
        <div class="container text-center text-white">
            <h2>문의하기</h2>
            <form>
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" class="form-control" id="name" placeholder="이름 입력">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" class="form-control" id="email" placeholder="이메일 입력">
                </div>
                <div class="form-group">
                    <label for="message">메시지</label>
                    <textarea class="form-control" id="message" rows="3" placeholder="메시지 입력"></textarea>
                </div>
                <button type="submit" class="btn btn-light">보내기</button>
            </form>
        </div>
    </div>
</div>


<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/3.1.2/fullpage.min.js"></script>
<script>
    new fullpage('#fullpage', {
        autoScrolling:true,
        navigation: true,
        navigationPosition: 'right',
    });
</script>
</body>
</html>
